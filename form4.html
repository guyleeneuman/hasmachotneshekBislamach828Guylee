<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

<body>
    <img class="navbar" src="assets/logos/logos.png" alt="icon 1">
    <img class="title" src="assets/titles/yatedholitT.png" alt="icon 1">

<form id="contactForm" class="pillForm">
<input type="tel" name="phone_number" placeholder="מס' טלפון">

  <input type="text" name="job" placeholder="תפקיד">

  <input type="number" name="solider_number" placeholder="מס' חיילים">

  <input type="text" name="place" placeholder="מיקום האימון">

  <!-- כותרת -->
<div class="dropdown">
  <div class="dropdownSelected" id="selectedUnit">
    בחר חטיבה
  </div>

  <div class="dropdownList" id="unitList">
    <div class="dropdownItem" data-value="צנחנים">
      <img src="assets/icons/צנחנים.png"> צנחנים
    </div>

    <div class="dropdownItem" data-value="כפיר">
      <img src="assets/icons/כפיר.png"> כפיר
    </div>

    <div class="dropdownItem" data-value="גבעתי">
      <img src="assets/icons/גבעתי.png"> גבעתי
    </div>

    <div class="dropdownItem" data-value="נחל">
      <img src="assets/icons/נחל.png"> נחל
    </div>

    <div class="dropdownItem" data-value="מרום">
      <img src="assets/icons/מרום.png"> מרום
    </div>

    <div class="dropdownItem" data-value="גולני">
      <img src="assets/icons/גולני.png"> גולני
    </div>

    <div class="dropdownItem noImg" data-value="אחר">
  אחר
    </div>
  </div>

  <input type="hidden" name="unit" id="unitInput">
</div>

  <!-- <div class="imageAndDetails">

    <div class="imageSelector">
      <label><input type="radio" name="unit" value="צנחנים"><img src="assets/icons/צנחנים.png"></label>
      <label><input type="radio" name="unit" value="כפיר"><img src="assets/icons/כפיר.png"></label>
      <label><input type="radio" name="unit" value="גבעתי"><img src="assets/icons/גבעתי.png"></label>
      <label><input type="radio" name="unit" value="נחל"><img src="assets/icons/נחל.png"></label>
      <label><input type="radio" name="unit" value="מרום"><img src="assets/icons/מרום.png"></label>
      <label><input type="radio" name="unit" value="גולני"><img src="assets/icons/גולני.png"></label>
      <label><input type="radio" name="unit" value="אחר"><img src="assets/icons/אחר.png"></label>
    </div> -->

  <!-- </div> -->

  <!-- הערות -->
  <textarea name="notes" placeholder="הערות:
  יתד/חולית/שניהם"></textarea>
  
<textarea class="detailsField" name="details" placeholder="פירוט:
גדוד/סיירת/אחר"></textarea>   <!-- כפתור שליחה -->
    <div class="datePickerContainer">
<div class="dateTimeRow">

  <!-- DATE -->
  <div class="datePickerContainer">
    <div class="fakeDate" id="dateDisplayText">תאריך</div>
    <input type="date" id="dateDisplay" required>
    <input type="hidden" name="date_range" id="dateInput">
  </div>

  <!-- TIME -->
  <div class="timeWrapper">
    <div class="fakeTime"></div>
    <input type="time" name="time" required>
  </div>

</div>
<button type="submit" class="submitBtn">
  <img src="assets/butttons/submit.png" alt="הגשה">
</button>

</form>
<div id="overlay"></div>

<div id="successPopup">
  <img src="assets/elements/popUp.png" alt="success">
</div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  emailjs.init("uc1sEM28TvnUbKJzo");
</script>
<script>
function goToMenu() {
    window.location.href = "menu.html";
}

/* =========================
     טווח תאריכים אוטומטי ליומיים
  ========================= */
  const dateDisplay = document.getElementById("dateDisplay");
  const dateInput = document.getElementById("dateInput");
  const dateDisplayText = document.getElementById("dateDisplayText");

  dateDisplay.addEventListener("change", () => {
      if (!dateDisplay.value) return;

      const start = new Date(dateDisplay.value);
      const end = new Date(start);
      end.setDate(end.getDate() + 0); // הוספת יום ליצירת טווח של יומיים

      const format = (d) =>
          `${String(d.getDate()).padStart(2, "0")}/${String(d.getMonth() + 1).padStart(2, "0")}/${d.getFullYear()}`;

      const startDateStr = format(start);
      const endDateStr = format(end);

      // שמירת הטווח המלא בשדה הנסתר שיישלח
      dateInput.value = `${startDateStr} - ${endDateStr}`;

    // עדכון הטקסט
    dateDisplayText.innerText = dateInput.value;

    /* 👇 שורת השינוי: מציג את האלמנט ברגע שיש ערך */
    dateDisplayText.style.display = "flex";
  });
/* =========================
     SUBMIT + EMAILJS
  ========================= */
  document.getElementById("contactForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const name = this.user_name.value.trim();
      const phone = this.phone_number.value.trim();
      const job = this.job.value.trim();
      const solider = this.solider_number.value.trim();
      const place = this.place.value.trim();
      const unit = document.getElementById("unitInput").value.trim();
      const details = this.details.value.trim();
      const notes = this.notes.value.trim();
      const date_range = document.getElementById("dateInput").value;
      const time = this.time.value;

      if (!name || !phone || !job || !solider || !place || !unit || !details || !date_range || !time) {
          alert("יש למלא את כל השדות ולבחור תאריך לפני שליחה");
          return;
      }
const data = {
          user_name: name,
          phone_number: phone,
          job: job,
          solider_number: solider,
          place: place,
          unit: unit,
          details: details,
          notes: notes,
          date_range: date_range, // נשלח כטווח תאריכים מוגדר (למשל: 31/05/2026 - 01/06/2026)
          time: time,
          title: "יתד חולית"
      };

      console.log("DATA TO SEND:", data);

      Promise.all([
          emailjs.send("service_4vrqa9g", "template_xhbmkmm", data),
          emailjs.send("service_4vrqa9g", "template_xhbmkmm", data)
      ])
      .then(() => {
          showPopup();
          this.reset();
          document.getElementById("selectedUnit").innerText = "בחר חטיבה";
          document.getElementById("unitInput").value = "";
          dateDisplayText.innerText = "בחר תאריך";
      })
      .catch((err) => {
          alert("שגיאה בשליחה: " + JSON.stringify(err));
      });
  });

  function showPopup() {
      const overlay = document.getElementById("overlay");
      const popup = document.getElementById("successPopup");
      overlay.style.display = "block";
      popup.style.display = "block";
      setTimeout(() => {
          overlay.style.display = "none";
          popup.style.display = "none";
      }, 3000);
  }

  /* =========================
     DROPDOWN
  ========================= */
  const selected = document.getElementById("selectedUnit");
  const list = document.getElementById("unitList");
  const hiddenInput = document.getElementById("unitInput");
  const dropdown = document.querySelector(".dropdown");

  selected.addEventListener("click", (e) => {
      e.stopPropagation();
      list.style.display = list.style.display === "block" ? "none" : "block";
  });

  document.querySelectorAll(".dropdownItem").forEach(item => {
      item.addEventListener("click", () => {
          const value = item.getAttribute("data-value");
          const img = item.querySelector("img");
          hiddenInput.value = value;

          if (img) {
              selected.innerHTML = `<img src="${img.src}" style="width:25px;height:25px;border-radius:6px;vertical-align:middle;margin-left:6px;"> ${value}`;
          } else {
              selected.innerHTML = value;
          }
          list.style.display = "none";
      });
  });

  document.addEventListener("click", (e) => {
      if (!dropdown.contains(e.target)) {
          list.style.display = "none";
      }
  });
</script>
<style>
    body {
    margin: 0;
    min-height: 100vh;
    background-image: url("assets/background/b1.png");

    direction: ltr;

}
   .title{

   }
   .forword {
    cursor: pointer;
    position: absolute;
    top: 85%;
    left: 22%;
    transform: translateX(-50%);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: manipulation;
    transition: transform 0.3s ease, filter 0.3s ease;
}

.forword:hover {
    transform: translateX(-50%) scale(1.1);
    filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.8));
}

.forword:active {
    transform: translateX(-50%) scale(0.95);
}
</style>
</html>

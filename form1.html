<!-- נשק אישי -->

    <div class="dropdownItem" data-value="M16">

<div class="dropdownItem" data-value="לא על נשק אישי">

      <img src="assets/icons/גבעתי.png"> גבעתי
    </div>

    <div class="dropdownItem" data-value="נחל">

    </div>

    <div class="dropdownItem" data-value="מרום">
      <img src="assets/icons/מרום.png"> מרום
    </div>

    <div class="dropdownItem" data-value="גולני">
      <img src="assets/icons/גולני.png"> גולני
    </div>

    <div class="dropdownItem noImg" data-value="אחר">
  אחר
    </div>
  </div>

</div>

      <label><input type="radio" name="unit" value="כפיר"><img src="assets/icons/כפיר.png"></label>

    </div> -->

  <!-- </div> -->

  <!-- הערות -->
  <textarea name="notes" placeholder="הערות:

<textarea class="detailsField" name="details" placeholder="פירוט:
גדוד/סיירת/אחר"></textarea>  <!-- כפתור שליחה -->





<!-- תאריך + שעה -->
<div class="dateTimeRow">

    <!-- DATE -->
    <div class="datePickerContainer">
        <div class="fakeDate" id="dateDisplayText">תאריך</div>
        <input type="date" id="dateDisplay" required>
        <input type="hidden" name="date_range" id="dateInput">
    </div>

    <!-- TIME -->
    <div class="timeWrapper">
        <div class="fakeTime" id="timeDisplayText">שעה</div>
        <input type="time" name="time" id="timeDisplay" required>
    </div>

</div>

<button type="submit" class="submitBtn">
  <img src="assets/butttons/submit.png" alt="הגשה">
</button>

  <img src="assets/elements/popUp.png" alt="success">

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  emailjs.init("uc1sEM28TvnUbKJzo");
</script>
<script>
function goToMenu() {
    window.location.href = "menu.html";
}

/* =========================
     טווח תאריכים אוטומטי ליומיים
  ========================= */
  const dateDisplay = document.getElementById("dateDisplay");
  const dateInput = document.getElementById("dateInput");
  const dateDisplayText = document.getElementById("dateDisplayText");

  dateDisplay.addEventListener("change", () => {
      if (!dateDisplay.value) return;

      const start = new Date(dateDisplay.value);
      const end = new Date(start);
      end.setDate(end.getDate() + 1); // הוספת יום ליצירת טווח של יומיים

      const format = (d) =>
          `${String(d.getDate()).padStart(2, "0")}/${String(d.getMonth() + 1).padStart(2, "0")}/${d.getFullYear()}`;

      const startDateStr = format(start);
      const endDateStr = format(end);

      // שמירת הטווח המלא בשדה הנסתר שיישלח
      dateInput.value = `${startDateStr} - ${endDateStr}`;

    // עדכון הטקסט
    dateDisplayText.innerText = dateInput.value;

    /* 👇 שורת השינוי: מציג את האלמנט ברגע שיש ערך */
    dateDisplayText.style.display = "flex";
  });
/* =========================
     SUBMIT + EMAILJS
  ========================= */
  document.getElementById("contactForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const name = this.user_name.value.trim();
      const phone = this.phone_number.value.trim();
      const job = this.job.value.trim();
      const solider = this.solider_number.value.trim();
      const place = this.place.value.trim();
      const unit = document.getElementById("unitInput").value.trim();
      const details = this.details.value.trim();
      const notes = this.notes.value.trim();
      const date_range = document.getElementById("dateInput").value;
      const time = this.time.value;
      const personal_weapon = document.getElementById("weaponInput").value.trim();
      const training_type =
    document.getElementById("trainingTypeInput").value.trim();
    if (!name || !phone || !job || !solider || !place ||
    !unit || !training_type || !details ||
    !date_range || !time) {

    alert("יש למלא את כל השדות ולבחור תאריך לפני שליחה");
    return;
}
const data = {
          user_name: name,
          phone_number: phone,
          job: job,
          solider_number: solider,
          training_place: place,
          unit: unit,
          details: details,
          notes: notes,
          personal_weapon: personal_weapon,
          training_type: training_type,
          date_range: date_range, // נשלח כטווח תאריכים מוגדר (למשל: 31/05/2026 - 01/06/2026)
          time: time,
          title: "מטול M203"
      };

      console.log("DATA TO SEND:", data);

      Promise.all([
          emailjs.send("service_4vrqa9g", "template_xhbmkmm", data),
          emailjs.send("service_4vrqa9g", "template_xhbmkmm", data)
      ])
      .then(() => {
          showPopup();
          this.reset();
          document.getElementById("selectedUnit").innerText = "בחר חטיבה";
          document.getElementById("unitInput").value = "";
          dateDisplayText.innerText = "בחר תאריך";
      })
      .catch((err) => {
          alert("שגיאה בשליחה: " + JSON.stringify(err));
      });
  });

 function showPopup() {
      // const overlay = document.getElementById("overlay");
      const popup = document.getElementById("successPopup");
      // overlay.style.display = "block";
      popup.style.display = "block";
      setTimeout(() => {
          // overlay.style.display = "none";
          popup.style.display = "none";
      }, 5000);
  }

  /* =========================
     DROPDOWN
  ========================= */
  const selected = document.getElementById("selectedUnit");
  const list = document.getElementById("unitList");
  const hiddenInput = document.getElementById("unitInput");
  const dropdown = document.querySelector(".dropdown");

  selected.addEventListener("click", (e) => {
      e.stopPropagation();
      list.style.display = list.style.display === "block" ? "none" : "block";
  });

list.querySelectorAll(".dropdownItem").forEach(item => {
    item.addEventListener("click", () => {

        const value = item.getAttribute("data-value");
        const img = item.querySelector("img");

        hiddenInput.value = value;

        if (img) {
            selected.innerHTML = `
                <img src="${img.src}"
                     style="width:25px;height:25px;border-radius:6px;
                     vertical-align:middle;margin-left:6px;">
                ${value}
            `;
        } else {
            selected.innerHTML = value;
        }

        list.style.display = "none";
    });
});

  document.addEventListener("click", (e) => {
      if (!dropdown.contains(e.target)) {
          list.style.display = "none";
      }
  });

const timeInput = document.querySelector('input[type="time"]');
const fakeTime = document.querySelector('.fakeTime');

timeInput.addEventListener('input', () => {
    if (timeInput.value) {
        fakeTime.style.display = 'none';
    } else {
        fakeTime.style.display = 'flex';
    }
});

/* =========================
     WEAPON DROPDOWN
========================= */
const selectedWeapon = document.getElementById("selectedWeapon");
const weaponList = document.getElementById("weaponList");
const weaponInput = document.getElementById("weaponInput");
const weaponDropdown = document.querySelector(".weaponDropdown");

selectedWeapon.addEventListener("click", (e) => {
    e.stopPropagation();
    weaponList.style.display =
        weaponList.style.display === "block" ? "none" : "block";
});

weaponList.querySelectorAll(".dropdownItem").forEach(item => {
    item.addEventListener("click", () => {

        const value = item.getAttribute("data-value");

        weaponInput.value = value;
        selectedWeapon.innerText = value;

        weaponList.style.display = "none";
    });
});

document.addEventListener("click", (e) => {
    if (!weaponDropdown.contains(e.target)) {
        weaponList.style.display = "none";
    }
});
const selectedTrainingType = document.getElementById("selectedTrainingType");
const trainingTypeList = document.getElementById("trainingTypeList");
const trainingTypeInput = document.getElementById("trainingTypeInput");
const typeDropdown = document.querySelector(".typeDropdown");

selectedTrainingType.addEventListener("click", (e) => {
    e.stopPropagation();

    trainingTypeList.style.display =
        trainingTypeList.style.display === "block"
            ? "none"
            : "block";
});

trainingTypeList.querySelectorAll(".dropdownItem").forEach(item => {
    item.addEventListener("click", () => {

        const value = item.dataset.value;

        trainingTypeInput.value = value;
        selectedTrainingType.innerText = value;

        trainingTypeList.style.display = "none";
    });
});

document.addEventListener("click", (e) => {
    if (!typeDropdown.contains(e.target)) {
        trainingTypeList.style.display = "none";
    }
});
dateDisplay.addEventListener("blur", () => {
    if (dateDisplay.value.trim() !== "") {
        alert("שים לב! בתאריכים שבחרת ימי ההסמכה הינם ימים מלאים (אין יציאה בסוף היום האחרון).");
    }
});

const selectedPlace = document.getElementById("selectedPlace");
const placeList = document.getElementById("placeList");
const placeInput = document.getElementById("placeInput");
const placeDropdown = document.querySelector(".placeDropdown");

selectedPlace.addEventListener("click", (e) => {
    e.stopPropagation();

    placeList.style.display =
        placeList.style.display === "block"
            ? "none"
            : "block";
});

placeList.querySelectorAll(".dropdownItem").forEach(item => {
    item.addEventListener("click", () => {

        const value = item.dataset.value;

        placeInput.value = value;
        selectedPlace.innerText = value;

        placeList.style.display = "none";

        // Alerts
        if (value === "ביסלח") {
            alert(
                "שים לב, נהג, חובש ותורן (מעל 10 חיילים) הינם על בסיס יחידתך"
            );
        }

        if (value === "אחר") {
            alert(
                "שים לב, לינת המדריכות, אמלח, חימוש, נהג רכב חיפוק וחובש, קצין מטוויח ושטח אש הינם על בסיס יחידתך."
            );
        }
    });
});

document.addEventListener("click", (e) => {
    if (!placeDropdown.contains(e.target)) {
        placeList.style.display = "none";
    }
});
</script>
